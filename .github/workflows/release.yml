name: Check, release and build image

on:
  push:
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write

env:
  DEPLOYMENT_FILE: manifests/deployment.yaml

jobs:
  lint:
      runs-on: ubuntu-latest

      steps:
          - name: Checkout
            uses: actions/checkout@v5

          - name: Setup Go and Task
            uses: ./.github/actions/setup-go-task

          - name: Lint
            run: task lint
  security:
      runs-on: ubuntu-latest

      steps:
          - name: Checkout
            uses: actions/checkout@v5

          - name: Setup Go and Task
            uses: ./.github/actions/setup-go-task

          - name: Security
            run: task security
  test:
      runs-on: ubuntu-latest

      steps:
          - name: Checkout
            uses: actions/checkout@v5

          - name: Setup Go and Task
            uses: ./.github/actions/setup-go-task

          - name: Tests
            run: task test

  release:
    needs:
        - lint
        - security
        - test

    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest

    outputs:
      released: ${{ steps.semantic.outputs.new_release_published }}
      version: ${{ steps.semantic.outputs.new_release_version }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: release
    if: ${{ github.ref == 'refs/heads/main' && needs.release.outputs.released == 'true' }}

    runs-on: [self-hosted, raspberry, docker-builder, watersystem-ml]

    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/bruli/watersystem-ml:v${{ needs.release.outputs.version }}
            ghcr.io/bruli/watersystem-ml:latest

      - name: Update deployment image tag
        run: |
          VERSION=v${{ needs.release.outputs.version }}

          sed -i "s|ghcr.io/bruli/watersystem-ml:.*|ghcr.io/bruli/watersystem-ml:${VERSION}|g" "${{ env.DEPLOYMENT_FILE }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "${{ env.DEPLOYMENT_FILE }}"
          git commit -m "chore: update image to ${VERSION}"
          git push